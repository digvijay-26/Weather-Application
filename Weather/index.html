<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="search">
        <input type="text" placeholder="Enter city name" spellcheck="false" />
        <button>
          <img src="/Projects/Weather/images/search.png" alt="Search" />
        </button>
      </div>
      <div class="error">
        <p>City not found</p>
      </div>
      <div class="weather">
        <img src="/Projects/Weather/images/rain.png" class="weather-icon" />
        <h1 class="temp">22°c</h1>
        <h2 class="city">New York</h2>
        <div class="details">
          <div class="col">
            <img src="/Projects/Weather/images/humidity.png" />
            <div>
              <p class="humidity">50%</p>
              <p>Humidity</p>
            </div>
          </div>
          <div class="col">
            <img src="/Projects/Weather/images/wind.png" />
            <div>
              <p class="wind">15 km/h</p>
              <p>Wind Speed</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      const apiKey = "5ea504926107fe38fd92c8fa1cef88e2";
      const baseUrl =
        "https://api.openweathermap.org/data/2.5/weather?units=metric&q=";

      const searchBox = document.querySelector(".search input");
      const searchBtn = document.querySelector(".search button");
      const weatherIcon = document.querySelector(".weather-icon");

      async function checkWeather(city = "Mumbai") {
        if (!city) city = "Mumbai";
        const url = `${baseUrl}${encodeURIComponent(city)}&appid=${apiKey}`;

        try {
          const response = await fetch(url);

          if (response.status === 404) {
            document.querySelector(".error").style.display = "block";
            document.querySelector(".weather").style.display = "none";
            return;
          }

          const data = await response.json();

          document.querySelector(".temp").innerHTML =
            Math.round(data.main.temp) + "°c";
          document.querySelector(".humidity").innerHTML =
            data.main.humidity + "%";
          document.querySelector(".wind").innerHTML = data.wind.speed + " km/h";
          document.querySelector(".city").innerHTML = data.name;

          if (data.weather[0].main == "Clouds") {
            weatherIcon.src = "/Projects/Weather/images/clouds.png";
          } else if (data.weather[0].main == "Clear") {
            weatherIcon.src = "/Projects/Weather/images/clear.png";
          } else if (data.weather[0].main == "Rain") {
            weatherIcon.src = "/Projects/Weather/images/rain.png";
          } else if (data.weather[0].main == "Drizzle") {
            weatherIcon.src = "/Projects/Weather/images/drizzle.png";
          } else if (data.weather[0].main == "Mist") {
            weatherIcon.src = "/Projects/Weather/images/mist.png";
          } else if (data.weather[0].main == "Snow") {
            weatherIcon.src = "/Projects/Weather/images/snow.png";
          }

          document.querySelector(".error").style.display = "none";
          document.querySelector(".weather").style.display = "block";
        } catch (err) {
          console.error("Weather fetch failed", err);
          document.querySelector(".error").style.display = "block";
          document.querySelector(".weather").style.display = "none";
        }
      }

      searchBtn.addEventListener("click", () => {
        checkWeather(searchBox.value.trim());
      });

      checkWeather();
    </script>
  </body>
</html>
